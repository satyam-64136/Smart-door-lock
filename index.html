<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Lock - Access Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(71, 85, 105, 0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.3), transparent);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .lock-icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.3));
    }

    .lock-icon .shackle {
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: 50% 35%;
      stroke: #3b82f6;
      stroke-width: 1.5;
    }

    .card.unlocked .lock-icon .shackle {
      transform: rotate(-40deg) translateY(-2px);
      stroke: #10b981;
      filter: drop-shadow(0 0 12px rgba(16, 185, 129, 0.4));
    }

    .card.unlocked .lock-icon circle {
      fill: #10b981;
      filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.5));
    }

    .title-group h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.5px;
    }

    .title-group p {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      transition: all 0.3s ease;
    }

    .status-dot.online {
      background: #3b82f6;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
    }

    .status-dot.success {
      background: #10b981;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
      animation: pulse 1.5s ease infinite;
    }

    .status-dot.error {
      background: #ef4444;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
    }

    .status-dot.warn {
      background: #f59e0b;
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    .steps {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #475569;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .step-dot.active {
      border-color: #3b82f6;
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.15);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
    }

    .step-dot.done {
      border-color: #10b981;
      background: #10b981;
      color: #f1f5f9;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
    }

    .step-line {
      flex: 1;
      height: 2px;
      background: #475569;
      transition: all 0.4s ease;
    }

    .step-line.done {
      background: linear-gradient(90deg, #10b981, transparent);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.3);
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-label {
      font-size: 11px;
      font-weight: 700;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .step-desc {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #e2e8f0;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    .otp-input {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid #475569;
      border-radius: 12px;
      background: rgba(30, 41, 59, 0.8);
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 12px;
      text-align: center;
      color: #3b82f6;
      transition: all 0.3s ease;
    }

    .otp-input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }

    .otp-input::placeholder {
      color: #64748b;
      letter-spacing: 6px;
    }

    .otp-timer {
      font-size: 12px;
      font-weight: 600;
      color: #f59e0b;
      text-align: center;
      margin-top: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 16px;
      position: relative;
      overflow: hidden;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(71, 85, 105, 0.3);
      color: #cbd5e1;
      border: 1.5px solid #475569;
      margin-top: 8px;
      font-size: 13px;
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: #3b82f6;
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }

    .btn .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    .btn.loading .btn-text {
      display: none;
    }

    .btn.loading .spinner {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      margin-top: 14px;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
      pointer-events: none;
      border-left: 3px solid;
      backdrop-filter: blur(8px);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: rgba(16, 185, 129, 0.1);
      border-left-color: #10b981;
      color: #6ee7b7;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.1);
      border-left-color: #ef4444;
      color: #fca5a5;
    }

    .toast.warn {
      background: rgba(245, 158, 11, 0.1);
      border-left-color: #f59e0b;
      color: #fcd34d;
    }

    .success-icon {
      text-align: center;
      margin-bottom: 20px;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .success-icon svg {
      width: 60px;
      height: 60px;
      margin: 0 auto;
      filter: drop-shadow(0 0 16px rgba(16, 185, 129, 0.4));
    }

    .success-title {
      font-size: 22px;
      font-weight: 700;
      color: #10b981;
      text-align: center;
      margin-top: 16px;
    }

    .success-desc {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      margin-top: 8px;
    }

    .activity {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(71, 85, 105, 0.4);
    }

    .activity-title {
      font-size: 11px;
      font-weight: 700;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    .activity-log {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 110px;
      overflow-y: auto;
    }

    .activity-log::-webkit-scrollbar {
      width: 4px;
    }

    .activity-log::-webkit-scrollbar-track {
      background: transparent;
    }

    .activity-log::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 2px;
    }

    .activity-item {
      font-size: 12px;
      display: flex;
      gap: 10px;
      color: #94a3b8;
      font-family: 'JetBrains Mono', monospace;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .activity-time {
      color: #64748b;
      flex-shrink: 0;
    }

    .activity-item.success { color: #6ee7b7; }
    .activity-item.error { color: #fca5a5; }
    .activity-item.warn { color: #fcd34d; }

    @media (max-width: 480px) {
      .card {
        padding: 28px 20px;
        border-radius: 16px;
      }

      .title-group h1 {
        font-size: 24px;
      }

      .header {
        gap: 12px;
        margin-bottom: 24px;
      }

      .lock-icon {
        width: 44px;
        height: 44px;
      }

      .btn {
        padding: 13px 16px;
        font-size: 13px;
      }

      .otp-input {
        font-size: 20px;
        letter-spacing: 10px;
      }

      .step-desc {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card" id="card">
    <div class="header">
      <div class="lock-icon">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="20" width="28" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path class="shackle" d="M14 20V14a8 8 0 0 1 16 0v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <circle cx="22" cy="30" r="2.5" fill="currentColor"/>
        </svg>
      </div>
      <div class="title-group">
        <h1>Smart Lock</h1>
        <p>Access Control System</p>
      </div>
    </div>

    <div class="status">
      <div class="status-dot online" id="statusDot"></div>
      <span id="statusText">System Online</span>
    </div>

    <div class="steps">
      <div class="step-dot active" id="step-dot-1">1</div>
      <div class="step-line" id="step-line-1"></div>
      <div class="step-dot" id="step-dot-2">2</div>
      <div class="step-line" id="step-line-2"></div>
      <div class="step-dot" id="step-dot-3">✓</div>
    </div>

    <div class="step active" id="step-1-content">
      <div class="step-label">Step 1 — Request Code</div>
      <div class="step-desc">Send a one-time code to your Telegram</div>
      <button class="btn btn-primary" id="sendBtn" onclick="sendOtp()">
        <span class="btn-text">Send Code</span>
        <span class="spinner"></span>
      </button>
      <div class="toast" id="toast-1"></div>
    </div>

    <div class="step" id="step-2-content">
      <div class="step-label">Step 2 — Verify Code</div>
      <div class="input-group">
        <label class="input-label">Enter 4-digit code</label>
        <input class="otp-input" id="otpInput" type="text" inputmode="numeric" maxlength="4" placeholder="•  •  •  •" autocomplete="off"/>
        <div class="otp-timer" id="timer"></div>
      </div>
      <button class="btn btn-primary" id="verifyBtn" onclick="verifyOtp()">
        <span class="btn-text">Unlock Door</span>
        <span class="spinner"></span>
      </button>
      <button class="btn btn-secondary" onclick="resetToStep1()">Request New Code</button>
      <div class="toast" id="toast-2"></div>
    </div>

    <div class="step" id="step-3-content">
      <div class="success-icon">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="28" r="26" stroke="currentColor" stroke-width="2" fill="rgba(16, 185, 129, 0.15)"/>
          <path d="M18 28l8 8 12-14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div class="success-title">Door Unlocked</div>
      <div class="success-desc">Access granted • Relay activated</div>
      <button class="btn btn-secondary" style="margin-top: 20px;" onclick="resetToStep1()">Lock Again</button>
    </div>

    <div class="activity">
      <div class="activity-title">Activity Log</div>
      <ul class="activity-log" id="log"></ul>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyxBRNu-kd1HDxtCAAP5HRUhkBzO0cMRG37LOnYcbhmrY6rGWLl5dk9SMbsJz2rSIYAqA/exec";
  const API_KEY = "satyam123";

  const $ = id => document.getElementById(id);
  const card = $("card");
  const log = $("log");
  const sendBtn = $("sendBtn");
  const verifyBtn = $("verifyBtn");
  const otpInput = $("otpInput");
  const timer = $("timer");
  const toast1 = $("toast-1");
  const toast2 = $("toast-2");
  const statusDot = $("statusDot");
  const statusText = $("statusText");

  otpInput.addEventListener("keyup", e => { if (e.key === "Enter") verifyOtp(); });

  function setStatus(type, text) {
    statusDot.className = "status-dot " + type;
    statusText.textContent = text;
  }

  function showToast(el, type, msg) {
    el.className = "toast " + type;
    el.textContent = msg;
    void el.offsetWidth;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 4000);
  }

  function addLog(type, msg) {
    const t = new Date().toLocaleTimeString("en-GB", { hour12: false });
    const li = document.createElement("li");
    li.className = "activity-item " + type;
    li.innerHTML = `<span class="activity-time">${t}</span><span>${msg}</span>`;
    log.prepend(li);
    while (log.children.length > 20) log.removeChild(log.lastChild);
  }

  function setStep(n) {
    for (let i = 1; i <= 3; i++) {
      const step = $("step-" + i + "-content");
      const dot = $("step-dot-" + i);
      const line = $("step-line-" + i);
      
      if (step) step.classList.toggle("active", i === n);
      if (dot) {
        dot.classList.remove("active", "done");
        if (i < n) dot.classList.add("done");
        else if (i === n) dot.classList.add("active");
      }
      if (line && i < 3) line.classList.toggle("done", i < n);
    }
    
    if (n === 3) {
      setStatus("success", "Door Unlocked");
      card.classList.add("unlocked");
      setTimeout(resetToStep1, 7000);
    }
  }

  function resetToStep1() {
    otpInput.value = "";
    timer.textContent = "";
    setStatus("online", "System Online");
    setStep(1);
    card.classList.remove("unlocked");
  }

  async function api(payload) {
    const params = new URLSearchParams({ ...payload, key: API_KEY });
    const r = await fetch(API_URL + "?" + params.toString(), { method: "GET", redirect: "follow" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return JSON.parse(await r.text());
  }

  async function sendOtp() {
    sendBtn.classList.add("loading");
    setStatus("warn", "Sending...");
    try {
      const data = await api({ action: "request_unlock", method: "WEB" });
      if (data.success) {
        addLog("success", "Code sent to Telegram");
        setStatus("warn", "Enter Your Code");
        setStep(2);
        otpInput.focus();
      } else {
        showToast(toast1, "error", "✗ " + (data.error || "Failed"));
        addLog("error", "Request failed");
        setStatus("error", "Failed");
      }
    } catch (e) {
      showToast(toast1, "error", "✗ Cannot connect");
      addLog("error", "Network error: " + e.message);
      setStatus("error", "Connection Error");
    } finally {
      sendBtn.classList.remove("loading");
    }
  }

  async function verifyOtp() {
    const otp = otpInput.value.trim();
    if (!/^\d{4}$/.test(otp)) {
      showToast(toast2, "warn", "Enter 4 digits");
      otpInput.focus();
      return;
    }
    verifyBtn.classList.add("loading");
    setStatus("warn", "Verifying...");
    try {
      const data = await api({ action: "verify_otp", method: "WEB", otp });
      console.log("Verification response:", data);
      if (data.success) {
        addLog("success", "Code verified ✓");
        setStep(3);
      } else {
        showToast(toast2, "error", "✗ " + (data.error || "Wrong code"));
        addLog("error", data.error || "Wrong code");
        setStatus("error", "Wrong Code");
        otpInput.select();
      }
    } catch (e) {
      showToast(toast2, "error", "✗ Cannot connect");
      addLog("error", "Network error: " + e.message);
      setStatus("error", "Connection Error");
    } finally {
      verifyBtn.classList.remove("loading");
    }
  }

  async function checkDelete() {
    try {
      await api({ action: "check_and_delete" });
    } catch (e) {}
  }

  setInterval(checkDelete, 1000);
  addLog("info", "System ready");
  setStatus("online", "System Online");
</script>
</body>
</html>
