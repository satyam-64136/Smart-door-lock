<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Lock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0c0f;
      --surface:    #111418;
      --border:     #1e2530;
      --accent:     #00e5a0;
      --accent-dim: #00a86b;
      --danger:     #ff4757;
      --warn:       #ffb830;
      --text:       #d4dce8;
      --muted:      #5a6a80;
      --mono:       'Share Tech Mono', monospace;
      --sans:       'Rajdhani', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      position: relative;
      width: min(420px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px 36px;
      box-shadow: 0 0 60px rgba(0,229,160,.06), 0 24px 60px rgba(0,0,0,.6);
    }
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 60px; height: 60px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
      border-radius: 12px 0 0 0;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 60px; height: 60px;
      border-bottom: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
      border-radius: 0 0 12px 0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .lock-icon { width: 44px; height: 44px; flex-shrink: 0; }
    .lock-icon .shackle {
      transition: transform .5s cubic-bezier(.34,1.56,.64,1);
      transform-origin: 50% 80%;
    }
    .card.unlocked .lock-icon .shackle {
      transform: rotate(-40deg) translateY(-3px);
    }
    .title-group h1 {
      font-size: 1.45rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: #fff;
    }
    .title-group p {
      font-family: var(--mono); font-size: .7rem;
      color: var(--muted); letter-spacing: .05em; margin-top: 2px;
    }

    /* ── Status ── */
    .status-row {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: .75rem;
      color: var(--muted); margin-bottom: 28px; letter-spacing: .04em;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot.online  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .dot.success { background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 1s ease 3; }
    .dot.warn    { background: var(--warn);   box-shadow: 0 0 8px var(--warn); }
    .dot.error   { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px var(--accent); }
      50%     { box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,229,160,.4); }
    }

    /* ── Step indicator ── */
    .step-indicator {
      display: flex; align-items: center; margin-bottom: 28px;
    }
    .s-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: .7rem; color: var(--muted);
      flex-shrink: 0; transition: all .3s;
    }
    .s-dot.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,.08); }
    .s-dot.done   { border-color: var(--accent-dim); background: var(--accent-dim); color: #000; }
    .s-line { flex: 1; height: 1.5px; background: var(--border); transition: background .3s; }
    .s-line.done { background: var(--accent-dim); }

    /* ── Steps ── */
    .step { display: none; }
    .step.active { display: block; }

    .step-label {
      font-size: .7rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }

    /* ── Input ── */
    .input-label {
      display: block; font-size: .75rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .otp-input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 16px; font-family: var(--mono);
      font-size: 1.5rem; letter-spacing: .3em;
      color: var(--text); outline: none; text-align: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .otp-input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(0,229,160,.1);
    }
    .otp-input::placeholder { letter-spacing: .15em; color: var(--muted); font-size: 1rem; }

    .hint {
      font-family: var(--mono); font-size: .7rem;
      color: var(--muted); margin-top: 10px;
      text-align: center; line-height: 1.6;
    }

    /* ── Buttons ── */
    .btn {
      margin-top: 20px; width: 100%; padding: 15px;
      border: none; border-radius: 8px; font-family: var(--sans);
      font-size: 1rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(.97); }

    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover:not(:disabled) {
      background: #1affc0;
      box-shadow: 0 0 24px rgba(0,229,160,.4);
    }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); margin-top: 10px;
      font-size: .8rem; padding: 10px;
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }

    .btn .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.3); border-top-color: #000;
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto;
    }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner  { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      margin-top: 16px; padding: 11px 15px; border-radius: 8px;
      font-family: var(--mono); font-size: .75rem; letter-spacing: .04em;
      opacity: 0; transform: translateY(6px);
      transition: opacity .3s, transform .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: rgba(0,229,160,.1); border: 1px solid rgba(0,229,160,.3); color: var(--accent); }
    .toast.error   { background: rgba(255,71,87,.1);  border: 1px solid rgba(255,71,87,.3);  color: var(--danger); }
    .toast.warn    { background: rgba(255,184,48,.1); border: 1px solid rgba(255,184,48,.3); color: var(--warn); }

    /* ── Success screen ── */
    .success-icon { text-align: center; padding: 12px 0 16px; }
    .success-icon svg { margin-bottom: 16px; }
    .success-title {
      font-size: 1.2rem; font-weight: 700;
      letter-spacing: .08em; color: #fff; text-transform: uppercase;
    }

    /* ── Log ── */
    .log-section { margin-top: 28px; border-top: 1px solid var(--border); padding-top: 18px; }
    .log-title {
      font-size: .7rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    .log-feed {
      list-style: none; display: flex; flex-direction: column;
      gap: 6px; max-height: 110px; overflow-y: auto;
    }
    .log-feed::-webkit-scrollbar { width: 3px; }
    .log-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-entry {
      font-family: var(--mono); font-size: .68rem;
      color: var(--muted); display: flex; gap: 8px;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: none; }
    }
    .log-entry .log-time { flex-shrink: 0; }
    .log-entry .log-ok   { color: var(--accent); }
    .log-entry .log-err  { color: var(--danger); }
    .log-entry .log-warn { color: var(--warn); }
    .log-entry .log-info { color: var(--text); }
  </style>
</head>
<body>
<div class="card" id="card">

  <!-- Header -->
  <div class="header">
    <svg class="lock-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="20" width="28" height="20" rx="4" fill="#1e2530" stroke="#00e5a0" stroke-width="1.5"/>
      <path class="shackle" d="M14 20V14a8 8 0 1 1 16 0v6" stroke="#00e5a0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <circle cx="22" cy="30" r="3" fill="#00e5a0"/>
      <line x1="22" y1="33" x2="22" y2="36" stroke="#00e5a0" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="title-group">
      <h1>Smart Lock</h1>
      <p>ACCESS CONTROL SYSTEM v1.0</p>
    </div>
  </div>

  <!-- Status -->
  <div class="status-row">
    <div class="dot online" id="statusDot"></div>
    <span id="statusText">SYSTEM ACTIVE</span>
  </div>

  <!-- Step indicator (3 steps) -->
  <div class="step-indicator">
    <div class="s-dot active" id="ind1">1</div>
    <div class="s-line"       id="line1"></div>
    <div class="s-dot"        id="ind2">2</div>
    <div class="s-line"       id="line2"></div>
    <div class="s-dot"        id="ind3">✓</div>
  </div>

  <!-- ══ STEP 1 : Request OTP ══ -->
  <div class="step active" id="step1">
    <div class="step-label">Step 1 — Request OTP</div>
    <p class="hint">Tap the button to receive a one-time code<br>on your Telegram.</p>
    <button class="btn btn-primary" id="sendOtpBtn" onclick="sendOtp()">
      <span class="btn-text">SEND OTP TO TELEGRAM</span>
      <span class="spinner"></span>
    </button>
    <div class="toast" id="toast1"></div>
  </div>

  <!-- ══ STEP 2 : Enter OTP ══ -->
  <div class="step" id="step2">
    <div class="step-label">Step 2 — Enter OTP</div>
    <label class="input-label" for="otpInput">4-digit code from Telegram</label>
    <input
      class="otp-input" id="otpInput"
      type="text" inputmode="numeric"
      maxlength="4" placeholder="• • • •" autocomplete="off"
    />
    <button class="btn btn-primary" id="verifyBtn" onclick="verifyOtp()">
      <span class="btn-text">VERIFY &amp; UNLOCK</span>
      <span class="spinner"></span>
    </button>
    <button class="btn btn-ghost" onclick="resetToStep1()">← Request a new OTP</button>
    <div class="toast" id="toast2"></div>
  </div>

  <!-- ══ STEP 3 : Success ══ -->
  <div class="step" id="step3">
    <div class="success-icon">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="27" stroke="#00e5a0" stroke-width="1.5" fill="rgba(0,229,160,.08)"/>
        <path d="M17 28.5l8 8 14-16" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="success-title">Door Unlocked</div>
      <p class="hint" style="margin-top:10px">Relay is active. Lock resets automatically.</p>
    </div>
    <button class="btn btn-ghost" style="margin-top:20px" onclick="resetToStep1()">DONE / LOCK AGAIN</button>
  </div>

  <!-- Activity log -->
  <div class="log-section">
    <div class="log-title">Activity Log</div>
    <ul class="log-feed" id="logFeed"></ul>
  </div>

</div>

<script>
  // ════════════════════════════════════════════════
  //  CONFIG
  // ════════════════════════════════════════════════
  const API_URL = "https://script.google.com/macros/s/AKfycbylvc6xeCWt1qGqZ4Vwtg7XAmLuCef11YHlAaOnDe8a6w24QqygtlZDXGHI8xH-EuvysQ/exec";
  const API_KEY = "satyam123";
  // ════════════════════════════════════════════════

  // DOM
  const $  = id => document.getElementById(id);
  const statusDot  = $("statusDot");
  const statusText = $("statusText");
  const card       = $("card");
  const logFeed    = $("logFeed");
  const sendOtpBtn = $("sendOtpBtn");
  const verifyBtn  = $("verifyBtn");
  const otpInput   = $("otpInput");
  const toast1     = $("toast1");
  const toast2     = $("toast2");
  const stepEls    = [$("step1"),  $("step2"),  $("step3")];
  const indEls     = [$("ind1"),   $("ind2"),   $("ind3")];
  const lineEls    = [$("line1"),  $("line2")];

  otpInput.addEventListener("keyup", e => { if (e.key === "Enter") verifyOtp(); });

  // ── Helpers ──────────────────────────────────

  function setStatus(cls, text) {
    statusDot.className    = "dot " + cls;
    statusText.textContent = text;
  }

  function toast(el, type, msg) {
    el.className = "toast " + type;
    el.textContent = msg;
    void el.offsetWidth;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 4500);
  }

  function log(type, msg) {
    const t  = new Date().toLocaleTimeString("en-GB", { hour12: false });
    const li = document.createElement("li");
    li.className = "log-entry";
    li.innerHTML = `<span class="log-time">${t}</span><span class="log-${type}">${msg}</span>`;
    logFeed.prepend(li);
    while (logFeed.children.length > 25) logFeed.removeChild(logFeed.lastChild);
  }

  function busy(btn, on) {
    btn.disabled = on;
    btn.classList.toggle("loading", on);
  }

  function goStep(n) {
    stepEls.forEach((s, i) => s.classList.toggle("active", i === n));
    indEls.forEach((d, i) => {
      d.className = "s-dot";
      if (i < n)       d.classList.add("done");
      else if (i === n) d.classList.add("active");
    });
    lineEls.forEach((l, i) => l.classList.toggle("done", i < n));
    card.classList.toggle("unlocked", n === 2);
    if (n === 2) {
      setStatus("success", "DOOR UNLOCKED");
      setTimeout(resetToStep1, 8000);   // auto-reset after 8 s
    }
  }

  function resetToStep1() {
    otpInput.value = "";
    setStatus("online", "SYSTEM ACTIVE");
    goStep(0);
  }

  async function api(payload) {
    // GET with query string: no CORS preflight, body survives Google's redirect.
    const params = new URLSearchParams({ ...payload, key: API_KEY });
    const r = await fetch(API_URL + "?" + params.toString(), {
      method: "GET",
      redirect: "follow"
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const text = await r.text();
    try {
      return JSON.parse(text);
    } catch {
      throw new Error("Invalid response: " + text.slice(0, 120));
    }
  }

  // ── Step 1 : Request OTP ─────────────────────

  async function sendOtp() {
    busy(sendOtpBtn, true);
    setStatus("warn", "SENDING OTP…");
    try {
      const data = await api({ action: "request_unlock", method: "WEB" });
      if (data.success) {
        log("ok", "OTP dispatched to Telegram");
        setStatus("warn", "WAITING FOR OTP ENTRY");
        goStep(1);
        setTimeout(() => otpInput.focus(), 150);
      } else {
        toast(toast1, "error", "✗ " + (data.error || "Server error."));
        log("err", "Request failed: " + (data.error || "unknown"));
        setStatus("error", "FAILED");
      }
    } catch (e) {
      toast(toast1, "error", "✗ Cannot reach server. Check your connection.");
      log("err", "Network: " + e.message);
      setStatus("error", "CONNECTION ERROR");
    } finally {
      busy(sendOtpBtn, false);
    }
  }

  // ── Step 2 : Verify OTP ──────────────────────

  async function verifyOtp() {
    const otp = otpInput.value.trim();
    if (!/^\d{4}$/.test(otp)) {
      toast(toast2, "warn", "Enter the 4-digit code from Telegram.");
      otpInput.focus();
      return;
    }
    busy(verifyBtn, true);
    setStatus("warn", "VERIFYING…");
    try {
      const data = await api({ action: "verify_otp", method: "WEB", otp });
      if (data.success) {
        log("ok", "OTP correct → unlock signal sent");
        goStep(2);
      } else {
        toast(toast2, "error", "✗ " + (data.error || "Wrong OTP."));
        log("err", "Wrong OTP entered");
        setStatus("error", "WRONG OTP");
        otpInput.select();
      }
    } catch (e) {
      toast(toast2, "error", "✗ Cannot reach server.");
      log("err", "Network: " + e.message);
      setStatus("error", "CONNECTION ERROR");
    } finally {
      busy(verifyBtn, false);
    }
  }

  // Init
  log("info", "Interface ready");
</script>
</body>
</html>
